<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Qualitative</title>
    <link rel="styleSheet" type="text/css" href="qual.css">
    <link rel="styleSheet" type="text/css" href="styleSheet.css">
    <script src="./app.js"></script>

</head>

<body id='body' class="qualBody" style="overflow: scroll;" onload="loadPage('qual')">
    <table class="qualTable" id="table">
        <tr>
            <th class="topSideBox" colspan="2">
                <input class="infoBox" type="text" name="teamBox" id="teamNumberBox" readonly />
            </th>
            <th colspan="4" class="header">Qualitative</th>
            <th class="topSideBox" colspan="2">
                <input class="infoBox" type="text" name="matchBox" id="matchNumberBox" readonly />
            </th>
        </tr>
        <tr class="tr1">
            <td colspan="2">Auton Comments</td>
            <td colspan="2">Teleop Comments</td>
            <td colspan="2">Defense Comments</td>
            <td colspan="2">Defense</td>
        </tr>
        <tr>
            <td rowspan="2" colspan="2">
                <textarea placeholder="Comments" class="commentBox" id="autonComments"
                    onchange="addComments(this.id)"></textarea>
            </td>
            <td rowspan="2" colspan="2">
                <textarea placeholder="Comments" class="commentBox" id="teleopComments"
                    onchange="addComments(this.id)"></textarea>
            </td>
            <td rowspan="3" colspan="2">
                <textarea placeholder="Comments" class="commentBox" id="defenseComments"
                    onchange="addComments(this.id)"></textarea>
            </td>
            <td colspan="2">
                <label>
                    <input type="checkbox" class="checkbox" id="defenseBot" onclick="addDefenseCheckbox(0, this.id)">
                    Defense Bot</label>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <label>
                    <input type="checkbox" class="checkbox" id="brokenMechanism"
                        onclick="addDefenseCheckbox(1, this.id)">
                    Broken Mechanism</label>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <button class="backForth nextColor" id="next" onclick="load('teleop')">&larr;</button>
            </td>
            <td colspan="2">
                Hopper Capacity Estimate:
                <input class="infoBox" type="text" name="hopperCapacity" id="hopperCapacityBox"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')" onchange="addHopperCapacity()" />
            </td>
            <td colspan="2">
                <button class="backForth nextColor" id="next" onclick="qualLoad('qr')">&rarr;</button>
            </td>
        </tr>
    </table>
</body>

</html>
