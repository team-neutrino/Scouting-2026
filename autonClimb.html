<!DOCTYPE html>
<html lang="en">
<script src="./app.js"></script>

<head>
  <meta charset="UTF-8">
  <title>Auton Climb</title>
  <link rel="styleSheet" type="text/css" href="climb.css">
  <link rel="styleSheet" type="text/css" href="styleSheet.css">
</head>

<body id='body' style="overflow: scroll;" onload="loadPage()">
  <table class="endGameTable" id="table">
    <tr class="yess id=" row1>
      <th class="topSideBox">
        <input class="infoBox" type="text" name="teamBox" id="teamNumberBox" readonly />
      </th>
      <th colspan="3" class="header">Auton Climb</th>
      <th class="topSideBox">
        <input class="infoBox" type="text" name="matchBox" id="matchNumberBox" readonly />
      </th>
    </tr>
    <tr id="row2">
      <td rowspan="3"></td>
      <td colspan="3">
        <button class="largeButton" id="L3" onclick="updateClimb(this.id, 'auton')">L3L</button>
        <button class="largeButton" id="M3" onclick="updateClimb(this.id, 'auton')">L3M</button>
        <button class="largeButton" id="R3" onclick="updateClimb(this.id, 'auton')">L3R</button>
        <button class="largeButton" id="F3" onclick="updateClimb(this.id, 'auton')">Failed L3</button>
      </td>
      <td>
        <button class="sideButton" id="backsideButton" onclick="selectBackside(this.id, 'auton')">Backside</button>
      </td>
    </tr>
    <tr id="row3">
      <td colspan="3">
        <button class="largeButton" id="L2" onclick="updateClimb(this.id, 'auton')">L2L</button>
        <button class="largeButton" id="M2" onclick="updateClimb(this.id, 'auton')">L2M</button>
        <button class="largeButton" id="R2" onclick="updateClimb(this.id, 'auton')">L2R</button>
        <button class="largeButton" id="F2" onclick="updateClimb(this.id, 'auton')">Failed L2</button>
      </td>
      <td>
        <button class="sideButton" id="noTry" onclick="updateClimb(this.id, 'auton')">No Attempt</button>
      </td>
    </tr>
    <tr id="row4">
      <td colspan="3">
        <button class="largeButton" id="L1" onclick="updateClimb(this.id, 'auton')">L1L</button>
        <button class="largeButton" id="M1" onclick="updateClimb(this.id, 'auton')">L1M</button>
        <button class="largeButton" id="R1" onclick="updateClimb(this.id, 'auton')">L1R</button>
        <button class="largeButton" id="F1" onclick="updateClimb(this.id, 'auton')">Failed L1</button>
      </td>
    </tr>
    <tr class="footer" id="row7">
      <td>
        <button class="backForth nextColor" id="next" onclick="load('auton')">&larr;</button>
      </td>
      <td colspan="3"></td>
      <td>
        <button class="backForth nextColor" id="next" onclick="load('teleop')">&rarr;</button>
      </td>
    </tr>
  </table>
</body>

</html>
